services:
  postgres:
    image: postgres:16
    container_name: weather_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE}
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
    volumes:
      - weather_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  weather_bot:
    build: .
    container_name: weather_bot
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env

volumes:
  weather_pg_data:
